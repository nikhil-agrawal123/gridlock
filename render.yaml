
services:
  - type: web
    name: gridlock-api
    runtime: python

    plan: free
    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"

      - key: TZ
        value: Asia/Kolkata

      - key: CATBOOST_PREDICT_THREADS
        value: "1"
