# Render blueprint for the Gridlock FastAPI backend.
# The Streamlit dashboard is hosted separately (Streamlit Community Cloud); point
# its TRAFFICSENSE_API env var at this service's URL.
services:
  - type: web
    name: gridlock-api
    runtime: python
    # The road graph is large in memory once loaded by NetworkX; the free plan's
    # 512 MB will likely OOM. Use a paid plan with more RAM for a stable deploy.
    plan: starter
    buildCommand: pip install -r requirements.txt
    # Bind 0.0.0.0:$PORT so Render's proxy can reach the service. Heavy imports
    # (osmnx/catboost) make cold start take ~20-30s, during which Render logs
    # "No open ports detected, continuing to scan..." -- it binds once imports
    # finish. The road graph itself loads lazily on first request, not at boot.
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
